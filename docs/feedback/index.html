<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="refresh" content="0; url=https://github.com/bonjour-studio/expose-feedback/discussions">
    <title>Expose Feedback</title>
    <meta
      name="description"
      content="Expose feedback redirects to the public GitHub Discussions hub for questions, ideas, and bug reports."
    >
    <link rel="icon" href="/assets/app-icon.jpg">
    <link rel="stylesheet" href="/assets/site.css?v=app-palette-20260516">
    <script>
      window.location.replace("https://github.com/bonjour-studio/expose-feedback/discussions");
    </script>
  </head>
  <body>
    <main class="redirect-page">
      <section class="redirect-panel">
        <p class="eyebrow">Community feedback</p>
        <h1>Taking you to GitHub Discussions.</h1>
        <p>
          Public questions, ideas, compatibility notes, and bug reports live in
          the Expose feedback repository.
        </p>
        <div class="hero-actions">
          <a class="button primary" href="https://github.com/bonjour-studio/expose-feedback/discussions">Open Discussions</a>
          <a class="button" href="https://github.com/bonjour-studio/expose-feedback/issues/new/choose">Report a bug</a>
        </div>
      </section>
    </main>
  </body>
</html>
